  </defs>
  <rect width="512" height="512" rx="112" fill="url(#cebra)"/>
  <line x1="256" y1="96" x2="256" y2="416" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <circle cx="256" cy="160" r="22" fill="#ffffff"/>
